# Source size (src/*): ~204.2 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwentity"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwentity - provides 'import xwentity' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "entity",
    "object",
    "schema",
    "actions",
    "data",
    "metadata",
    "caching",
    "exonware",
]
classifiers = []
dependencies = [
    "exonware-xwentity",
]
exonware-xwaction = "356878 ; 0.34 MB"
exonware-xwdata = "514480 ; 0.49 MB"
exonware-xwschema = "359128 ; 0.34 MB"
authors = []
"{ name" = "eXonware Backend Team"

[project.license]
text = "MIT"

[project.optional-dependencies]
dev = [
    "exonware-xwentity[dev]",
]
"black>" = [
    "exonware-xwentity[black>]",
]
"exonware-xwaction[dev]" = [
    "exonware-xwentity[exonware-xwaction[dev]]",
]
"exonware-xwdata[dev]" = [
    "exonware-xwentity[exonware-xwdata[dev]]",
]
exonware-xwlazy = [
    "exonware-xwentity[exonware-xwlazy]",
]
"exonware-xwschema[dev]" = [
    "exonware-xwentity[exonware-xwschema[dev]]",
]
"isort>" = [
    "exonware-xwentity[isort>]",
]
"mypy>" = [
    "exonware-xwentity[mypy>]",
]
"pytest>" = [
    "exonware-xwentity[pytest>]",
]
"pytest-asyncio>" = [
    "exonware-xwentity[pytest-asyncio>]",
]
"pytest-cov>" = [
    "exonware-xwentity[pytest-cov>]",
]
lazy = [
    "exonware-xwentity[lazy]",
]
"exonware-xwaction[lazy]" = [
    "exonware-xwentity[exonware-xwaction[lazy]]",
]
"exonware-xwdata[lazy]" = [
    "exonware-xwentity[exonware-xwdata[lazy]]",
]
"exonware-xwschema[lazy]" = [
    "exonware-xwentity[exonware-xwschema[lazy]]",
]
full = [
    "exonware-xwentity[full]",
]
atomicwrites = [
    "exonware-xwentity[atomicwrites]",
]
bottleneck = [
    "exonware-xwentity[bottleneck]",
]
cloudpickle = [
    "exonware-xwentity[cloudpickle]",
]
cython = [
    "exonware-xwentity[cython]",
]
"exonware-xwaction[full]" = [
    "exonware-xwentity[exonware-xwaction[full]]",
]
"exonware-xwdata[full]" = [
    "exonware-xwentity[exonware-xwdata[full]]",
]
"exonware-xwschema[full]" = [
    "exonware-xwentity[exonware-xwschema[full]]",
]
interegular = [
    "exonware-xwentity[interegular]",
]
lz4 = [
    "exonware-xwentity[lz4]",
]
numexpr = [
    "exonware-xwentity[numexpr]",
]
pandas = [
    "exonware-xwentity[pandas]",
]
pyarrow = [
    "exonware-xwentity[pyarrow]",
]
pytz = [
    "exonware-xwentity[pytz]",
]
regex = [
    "exonware-xwentity[regex]",
]
uarray = [
    "exonware-xwentity[uarray]",
]

[project.urls]
Homepage = "https://exonware.com"
Documentation = "https://github.com/exonware/xwentity#readme"
Repository = "https://github.com/exonware/xwentity"
Subtree = "https://github.com/exonware/xwentity.git"

[tool.black]
line-length = 88
target-version = [
    "py312",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = "-v --tb=short"
markers = []

[tool.hatch.version]
path = "src/exonware/xwentity/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwentity_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/.github",
]
