# Source size (src/*): ~205.9 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwentity"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwentity - provides 'import xwentity' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "entity",
    "object",
    "schema",
    "actions",
    "data",
    "metadata",
    "caching",
    "exonware",
]
classifiers = []
dependencies = [
    "exonware-xwentity",
]
authors = [
    { name = "eXonware Backend Team", email = "connect@exonware.com" },
]

[project.license]
text = "Apache-2.0"

[project.optional-dependencies]
    # First-party XW libs composed by this package (excludes exonware-xwsystem==0.9.0.37; see lazy/full).
xw = [
    "exonware-xwentity[xw]",
]
lazy = [
    "exonware-xwentity[lazy]",
]
full = [
    "exonware-xwentity[full]",
]
dev = [
    "exonware-xwentity[dev]",
]

[project.urls]
Homepage = "https://exonware.com"
Documentation = "https://github.com/exonware/xwentity#readme"
Repository = "https://github.com/exonware/xwentity"
Subtree = "https://github.com/exonware/xwentity.git"

[tool.black]
line-length = 88
target-version = [
    "py312",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = "-v --tb=short"
markers = []

[tool.hatch.version]
path = "src/exonware/xwentity/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwentity_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/.github",
]
